<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Generador de Tarjetas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .card-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 7px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
        }

        input.ok    { border-color: #2ecc71; }
        input.error { border-color: #e74c3c; }

        .hint {
            font-size: 0.78rem;
            margin-top: 5px;
            min-height: 18px;
        }
        .hint.ok    { color: #27ae60; }
        .hint.error { color: #e74c3c; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            font-family: inherit;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(52,152,219,0.35);
        }

        .error-banner {
            display: none;
            background: #fdf0f0;
            border: 1px solid #e74c3c;
            border-radius: 10px;
            padding: 12px 16px;
            color: #c0392b;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.88rem;
        }

        .success-banner {
            display: none;
            background: #eafaf1;
            border: 1px solid #2ecc71;
            border-radius: 10px;
            padding: 12px 16px;
            color: #1e8449;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.88rem;
        }

        .footer-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.88rem;
            color: #7f8c8d;
        }
        .footer-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link a:hover { text-decoration: underline; }

        .intentos-aviso {
            font-size: 0.78rem;
            color: #e67e22;
            text-align: center;
            margin-top: 8px;
            min-height: 18px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h1>🔐 Iniciar sesión</h1>
        <p>Accede a tu Generador de Tarjetas</p>
    </div>

    <div class="error-banner"   id="errorBanner"></div>
    <div class="success-banner" id="successBanner"></div>

    <form id="loginForm" novalidate>

        <div class="form-group">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Tu nombre de usuario" autocomplete="username">
            <p class="hint" id="usuarioHint"></p>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
            <p class="hint" id="pwdHint"></p>
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
        <p class="intentos-aviso" id="intentosAviso"></p>
    </form>

    <p class="footer-link">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
</div>

<script>
// ── Estado de intentos ────────────────────────────────────────
let intentosFallidos = 0;
const MAX_INTENTOS   = 5;

const usuarioEl = document.getElementById('usuario');
const passwordEl = document.getElementById('password');
const usuarioHint = document.getElementById('usuarioHint');
const pwdHint     = document.getElementById('pwdHint');
const errorBanner   = document.getElementById('errorBanner');
const successBanner = document.getElementById('successBanner');
const intentosAviso = document.getElementById('intentosAviso');

// ── Validación en tiempo real (campos vacíos) ─────────────────
usuarioEl.addEventListener('input', () => {
    if (!usuarioEl.value.trim()) {
        usuarioEl.className = 'error';
        usuarioHint.className = 'hint error';
        usuarioHint.textContent = 'El usuario es obligatorio';
    } else {
        usuarioEl.className = 'ok';
        usuarioHint.className = 'hint ok';
        usuarioHint.textContent = '✔';
    }
});

passwordEl.addEventListener('input', () => {
    if (!passwordEl.value) {
        passwordEl.className = 'error';
        pwdHint.className = 'hint error';
        pwdHint.textContent = 'La contraseña es obligatoria';
    } else {
        passwordEl.className = 'ok';
        pwdHint.className = 'hint ok';
        pwdHint.textContent = '✔';
    }
});

// ── Submit ────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    errorBanner.style.display   = 'none';
    successBanner.style.display = 'none';

    const usuario  = usuarioEl.value.trim();
    const password = passwordEl.value;
    let hayError = false;

    if (!usuario) {
        usuarioEl.className = 'error';
        usuarioHint.className = 'hint error';
        usuarioHint.textContent = 'El usuario es obligatorio';
        hayError = true;
    }
    if (!password) {
        passwordEl.className = 'error';
        pwdHint.className = 'hint error';
        pwdHint.textContent = 'La contraseña es obligatoria';
        hayError = true;
    }
    if (hayError) return;

    // Bloqueo por intentos
    if (intentosFallidos >= MAX_INTENTOS) {
        errorBanner.textContent = `🔒 Demasiados intentos fallidos. Recarga la página para continuar.`;
        errorBanner.style.display = 'block';
        return;
    }

    // Verificar credenciales contra la base de datos
    const btn = document.querySelector('.btn-submit');
    btn.disabled = true;
    btn.textContent = 'Verificando...';

    const params = new URLSearchParams();
    params.append('usuario',  usuario);
    params.append('password', password);

    fetch('loginVerificar.php', {
        method:  'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:    params.toString()
    })
    .then(res => res.json())
    .then(data => {
        btn.disabled = false;
        btn.textContent = 'Entrar';

        if (data.ok) {
            intentosFallidos = 0;
            intentosAviso.textContent = '';
            successBanner.textContent = `✅ ¡Bienvenido, ${data.usuario}! Redirigiendo…`;
            successBanner.style.display = 'block';

            sessionStorage.setItem('usuarioActivo', data.usuario);
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        } else {
            intentosFallidos++;
            const restantes = MAX_INTENTOS - intentosFallidos;

            usuarioEl.className  = 'error';
            passwordEl.className = 'error';

            errorBanner.textContent = '❌ Usuario o contraseña incorrectos';
            errorBanner.style.display = 'block';

            if (restantes > 0) {
                intentosAviso.textContent = `Intentos restantes: ${restantes}`;
            } else {
                intentosAviso.textContent = '🔒 Cuenta bloqueada temporalmente';
            }
        }
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = 'Entrar';
        errorBanner.textContent = '❌ Error de conexión con el servidor';
        errorBanner.style.display = 'block';
    });
});
</script>

</body>
</html>
